# Versefold nginx server block
#
# Install this as its own file on the droplet so it coexists with the existing
# NRGX Labs site without modifying that config:
#
#   sudo cp versefold.conf /etc/nginx/sites-available/versefold
#   sudo ln -s /etc/nginx/sites-available/versefold /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot (see DEPLOY.md) to add HTTPS. Certbot rewrites this file to
# add the listen 443 / ssl_certificate lines automatically.

# Primary site: versefold.app
server {
    listen 80;
    listen [::]:80;
    server_name versefold.app www.versefold.app;

    root /var/www/versefold;
    index index.html;

    # Next.js static export writes <route>.html files
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    # Long-lived cache for fingerprinted assets
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Modest cache for the logo images
    location ~* \.(png|jpg|jpeg|svg|ico|webp)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

# Secondary domain: redirect getversefold.com -> versefold.app
server {
    listen 80;
    listen [::]:80;
    server_name getversefold.com www.getversefold.com;
    return 301 https://versefold.app$request_uri;
}
