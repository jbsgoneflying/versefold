# Versefold API server block (beta)
#
#   sudo cp api.versefold.conf /etc/nginx/sites-available/versefold-api
#   sudo ln -s /etc/nginx/sites-available/versefold-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.versefold.app
#
# DNS: add an A record for api.versefold.app pointing at the droplet first.

server {
    listen 80;
    server_name api.versefold.app;

    # Backend runs as the versefold-api systemd service on port 8787
    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # study generation can take a while
    }

    # Streaming unfold (SSE): partial events must flow through unbuffered.
    # (The backend also sends X-Accel-Buffering: no as belt-and-suspenders.)
    location /v1/ai/explain/stream {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        gzip off;
    }

    # Never serve metrics publicly
    location /metrics {
        allow 127.0.0.1;
        deny all;
    }

    gzip on;
    gzip_types application/json;
}
