name: Deploy to DigitalOcean

# Builds the static export and deploys it to the droplet over SSH on every
# push to main. Deploys only into /var/www/versefold, so the existing NRGX
# Labs site on the same droplet is never touched.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Backend install, typecheck, and tests
        working-directory: backend
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.DROPLET_PORT || '22' }}" -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.DROPLET_PORT || '22' }}" \
            out/ \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:${{ secrets.DROPLET_PATH || '/var/www/versefold' }}/"

      - name: Deploy backend via rsync
        run: |
          rsync -avz --delete \
            --exclude node_modules --exclude data --exclude .env --exclude index \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.DROPLET_PORT || '22' }}" \
            backend/ \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/versefold-api/"

      - name: Install backend deps and restart service
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.DROPLET_PORT || '22' }}" \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "cd /var/www/versefold-api && npm ci --omit=dev --ignore-scripts && npm i --no-save tsx typescript && mkdir -p data && (sudo systemctl restart versefold-api || true)"

      - name: Run backend tests before considering deploy healthy
        if: always()
        run: |
          curl -fsS --retry 5 --retry-delay 3 "https://api.versefold.app/health" || echo "health check skipped (api not yet provisioned)"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
