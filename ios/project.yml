# XcodeGen project spec. Generate the Xcode project with:
#   brew install xcodegen   (once)
#   cd ios && xcodegen generate
# Then open Versefold.xcodeproj. Building also requires accepting the Xcode
# license once: sudo xcodebuild -license accept
name: Versefold
options:
  bundleIdPrefix: app.versefold
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: VFDP96W9C2
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "11"
    # Standard HTTPS only — answers the export-compliance question once,
    # instead of on every TestFlight upload.
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Versefold saves your Scripture cards to your photo library."
targets:
  Versefold:
    type: application
    platform: iOS
    sources:
      - path: Versefold
        excludes:
          - Resources
      # Folder reference so the bundle keeps the kjv/ subdirectory structure
      - path: Versefold/Resources/kjv
        type: folder
        buildPhase: resources
    # System launch screen: the book mark centered on the brand ivory —
    # the exact first frame of SplashView, so launch feels like one motion.
    info:
      path: Versefold/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.versefold.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Versefold
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # iPhone-only for v1 (iPad is a Phase 5 expansion). Portrait-only is
        # fine for iPhone, but iPad requires all orientations — so exclude it.
        TARGETED_DEVICE_FAMILY: "1"
  # Drives the real UI in the simulator: swipes to scroll, hold-drags the pen.
  # Exists because gesture arbitration bugs are invisible to type checks.
  VersefoldUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [VersefoldUITests]
    dependencies:
      - target: Versefold
schemes:
  Versefold:
    build:
      targets:
        Versefold: all
        VersefoldUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [VersefoldUITests]
