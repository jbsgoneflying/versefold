# XcodeGen project spec. Generate the Xcode project with:
#   brew install xcodegen   (once)
#   cd ios && xcodegen generate
# Then open Versefold.xcodeproj. Building also requires accepting the Xcode
# license once: sudo xcodebuild -license accept
name: Versefold
options:
  bundleIdPrefix: app.versefold
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Versefold saves your Scripture cards to your photo library."
targets:
  Versefold:
    type: application
    platform: iOS
    sources:
      - path: Versefold
        excludes:
          - Resources
      # Folder reference so the bundle keeps the kjv/ subdirectory structure
      - path: Versefold/Resources/kjv
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.versefold.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Versefold
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
